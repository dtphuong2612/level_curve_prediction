<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Difficulty Curve Predictor</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      :root {
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --font-mono: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, monospace;
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f5;
        --color-background-info: #eff6ff;
        --color-background-warning: #fffbeb;
        --color-background-danger: #fef2f2;
        --color-background-success: #f0fdf4;
        --color-text-primary: #111827;
        --color-text-secondary: #4b5563;
        --color-text-tertiary: #9ca3af;
        --color-text-info: #1d4ed8;
        --color-text-warning: #b45309;
        --color-text-danger: #b91c1c;
        --color-text-success: #15803d;
        --color-border-tertiary: #e5e7eb;
        --color-border-info: #bfdbfe;
        --color-border-warning: #fcd34d;
      }
      body {
        margin: 0;
        font-family: var(--font-sans);
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        padding: 1rem;
        max-width: 820px;
        margin: 0 auto;
      }
      button {
        cursor: pointer;
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: 6px;
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        font-family: var(--font-sans);
      }
      button:hover { background: var(--color-background-secondary); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
